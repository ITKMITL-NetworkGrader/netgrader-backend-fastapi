- name: "Get routing table from network device {{ target_device }}"
  ansible.netcommon.net_get:
    command: "{{ route_command | default('show ip route') }}"
  register: route_result_net
  when: ansible_network_os is defined
  ignore_errors: true

- name: "Get routing table from Linux {{ target_device }}"
  shell: "{{ route_command | default('ip route show') }}"
  register: route_result_linux
  when: ansible_network_os is not defined
  ignore_errors: true

- name: "Store raw route results for Python processing"
  debug:
    msg:
      test_type: "route"
      device_type: "{{ 'network' if ansible_network_os is defined else 'linux' }}"
      command: "{{ route_command | default('show ip route' if ansible_network_os is defined else 'ip route show') }}"
      raw_result: "{{ route_result_net if ansible_network_os is defined else route_result_linux }}"
  tags:
    - "test_id:{{ test_id }}"
    - raw_data