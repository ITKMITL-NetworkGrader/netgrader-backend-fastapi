- name: "Check service {{ service_name }} status"
  shell: |
    {% if service_manager | default('systemctl') == 'systemctl' %}
    systemctl is-active {{ service_name }}
    {% elif service_manager == 'service' %}
    service {{ service_name }} status
    {% else %}
    ps aux | grep -v grep | grep {{ service_name }}
    {% endif %}
  register: service_result
  ignore_errors: true

- name: "Check port {{ port }} availability"
  shell: |
    {% if port is defined %}
    netstat -tuln | grep :{{ port }} || ss -tuln | grep :{{ port }}
    {% else %}
    echo "No port specified"
    {% endif %}
  register: port_result
  ignore_errors: true
  when: port is defined

- name: "Store raw service results for Python processing"
  debug:
    msg:
      test_type: "service"
      service_name: "{{ service_name }}"
      port: "{{ port | default('none') }}"
      device_type: "linux"
      raw_result:
        service_check: "{{ service_result }}"
        port_check: "{{ port_result if port is defined else {} }}"
  tags:
    - "test_id:{{ test_id }}"
    - raw_data