# Enhanced Ping Test - YAML DSL Example
# Demonstrates advanced ping testing with packet loss analysis and conditional logic

template_name: "enhanced_ping"
description: "Enhanced ping test with packet loss analysis and retry logic"
connection_type: "napalm"

parameters:
  target_ip:
    type: string
    description: "Target IP address to ping"
    required: true
  ping_count:
    type: integer
    description: "Number of ping packets to send"
    default: 5
    min: 1
    max: 100
  extended_count:
    type: integer
    description: "Number of extended ping packets"
    default: 10
    min: 1
    max: 100
  threshold:
    type: integer
    description: "Success rate threshold percentage"
    default: 70
    min: 0
    max: 100

steps:
  - name: "Initial ping test"
    action: "ping"
    target: "{{ target_ip }}"
    count: "{{ ping_count | default(5) }}"
    timeout: 10
    register: "initial_ping"
  
  - name: "Parse success rate"
    action: "parse_output"
    input: "{{ initial_ping.stdout }}"
    pattern: "Success rate is (\\d+) percent"
    register: "success_rate_match"
  
  - name: "Extended ping if poor connectivity"
    action: "ping"
    target: "{{ target_ip }}"
    count: "{{ extended_count | default(10) }}"
    timeout: 20
    register: "extended_ping"
    when: "success_rate_match.match|int < 80"
  
  - name: "Parse extended results"
    action: "parse_output"
    input: "{{ extended_ping.stdout }}"
    pattern: "Success rate is (\\d+) percent"
    register: "extended_success_rate"
    when: "success_rate_match.match|int < 80"
  
  - name: "Calculate final metrics"
    action: "set_result"
    status: "{{ 'passed' if final_success_rate|int >= threshold|default(70)|int else 'failed' }}"
    final_success_rate: "{{ extended_success_rate.match if extended_success_rate.match else success_rate_match.match }}"
    packet_loss: "{{ 100 - final_success_rate|int }}"
    test_type: "{{ 'extended' if extended_ping else 'standard' }}"
    connectivity_quality: "{{ 'excellent' if final_success_rate|int >= 95 else ('good' if final_success_rate|int >= 80 else ('poor' if final_success_rate|int >= 50 else 'critical')) }}"
    total_packets_sent: "{{ (extended_count|default(10)|int if extended_ping else ping_count|default(5)|int) }}"