# VLAN Configuration Check - YAML DSL Example
# Demonstrates network configuration validation with multiple commands and parsing

template_name: "vlan_config_check"
description: "Verify VLAN configuration and port assignments on network switches"
connection_type: "netmiko"

parameters:
  vlan_id:
    type: integer
    description: "VLAN ID to check"
    required: true
    min: 1
    max: 4094
  vlan_name:
    type: string
    description: "Expected VLAN name"
    required: true
  interface:
    type: string
    description: "Interface to check VLAN assignment"
    required: true
  mode:
    type: string
    description: "Expected interface mode (access or trunk)"
    default: "access"
    choices: ["access", "trunk"]
  check_svi:
    type: boolean
    description: "Whether to check SVI interface status"
    default: false

steps:
  - name: "Get VLAN database information"
    action: "command"
    command: "show vlan brief"
    register: "vlan_output"
  
  - name: "Check if target VLAN exists"
    action: "parse_output"
    input: "{{ vlan_output.stdout }}"
    pattern: "^{{ vlan_id }}\\s+{{ vlan_name }}\\s+"
    register: "vlan_exists"
  
  - name: "Get interface VLAN assignment"
    action: "command"
    command: "show interfaces {{ interface }} switchport"
    register: "switchport_output"
    when: "vlan_exists.matches"
  
  - name: "Parse access VLAN assignment"
    action: "parse_output"
    input: "{{ switchport_output.stdout }}"
    pattern: "Access Mode VLAN: (\\d+)"
    register: "access_vlan"
    when: "switchport_output"
  
  - name: "Verify trunk VLANs if applicable"
    action: "parse_output"
    input: "{{ switchport_output.stdout }}"
    pattern: "Trunking VLANs Enabled: ([^\\n]+)"
    register: "trunk_vlans"
    when: "switchport_output and mode|default('access') == 'trunk'"
  
  - name: "Check VLAN interface status"
    action: "command"
    command: "show ip interface vlan{{ vlan_id }}"
    register: "vlan_interface"
    when: "vlan_exists.matches and check_svi|default(false)"
  
  - name: "Assert VLAN configuration correctness"
    action: "assert"
    condition: "vlan_exists.matches and (access_vlan.match == vlan_id|string or (trunk_vlans and vlan_id|string in trunk_vlans.match))"
    message: "VLAN {{ vlan_id }} properly configured on interface {{ interface }}"
  
  - name: "Set final result"
    action: "set_result"
    status: "{{ 'passed' if vlan_configured else 'failed' }}"
    vlan_exists: "{{ vlan_exists.matches|length > 0 }}"
    vlan_configured: "{{ vlan_exists.matches and (access_vlan.match == vlan_id|string or (trunk_vlans and vlan_id|string in trunk_vlans.match)) }}"
    interface_mode: "{{ 'trunk' if trunk_vlans else 'access' }}"
    assigned_vlan: "{{ access_vlan.match if access_vlan.match else 'trunk' }}"
    vlan_name_found: "{{ vlan_name if vlan_exists.matches else 'N/A' }}"
    svi_status: "{{ 'up' if vlan_interface and 'up' in vlan_interface.stdout else 'down' }}"