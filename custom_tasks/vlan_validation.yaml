# Interface Status Check - Custom Task Example  
# Demonstrates checking multiple VLAN parameters using NAPALM

task_name: "vlan_validation"
description: "Comprehensive VLAN status and configuration check"
connection_type: "napalm"
author: "NetGrader Team"
version: "1.0.0" 
points: 10

parameters:
  - name: "interface_name"
    datatype: "string"
    description: "Name of the interface to check (e.g., GigabitEthernet0/1)"
    required: true
    example: "GigabitEthernet0/1"
  - name: "expected_vlan_id"
    datatype: "integer"
    description: "Expected VLAN ID that should be configured"
    required: true
    example: "100"

# debug:
#   show_registered_variables: true

commands:
  - name: "get_vlan_data"
    action: "napalm_get"
    parameters:
      getter: "get_vlans"
    register: "vlan_data"

  - name: "parse_vlan_count"
    action: "parse_output"
    parameters:
      input: "{{vlan_data}}"
      parser: "jinja"
      template: |
        {% set cfg = input.get(parameters.expected_vlan_id|string) %}
        is_configured: {{ parameters.interface_name in (cfg.interfaces if cfg else []) }}
    register: "parsed_vlan_check"

validation:
  - field: "parsed_vlan_check.data.is_configured"
    condition: "equals"
    value: true
    description: "Expected VLAN ID should be configured on the specified interface"