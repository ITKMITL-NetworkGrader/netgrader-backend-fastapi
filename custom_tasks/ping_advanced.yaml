# Linux Advanced Ping Task Template
# An advanced ping task that works only with Linux devices,
# with dynamically configurable success/failure expectations.

task_name: "ping_advanced"
description: "Advanced Linux ping test with dynamic success/failure validation"
connection_type: "ssh"
author: "NetGrader Team"
version: "1.0.0"
points: 15

parameters:
  - name: "target_ip"
    datatype: "ip_address | domain_name"
    description: "Target IP address or hostname to ping"
    required: true
    example: "192.168.1.100"
  
  - name: "ping_count"
    datatype: "integer"
    description: "Number of ping packets to send (default: 5)"
    required: false
    example: "5"
  
  - name: "expect_success"
    datatype: "boolean"
    description: "Set to true if ping should succeed, false if it should fail"
    required: true
    example: "true"
  
  - name: "min_success_rate"
    datatype: "integer"
    description: "Minimum success rate percentage when expecting success (default: 80)"
    required: false
    example: "80"
  
  - name: "max_failure_rate"
    datatype: "integer"
    description: "Maximum allowed success rate when expecting failure (default: 20)"
    required: false
    example: "20"

debug:
  show_command_results: true
  show_registered_variables: true
  show_validation_details: true
  show_parameter_substitution: true
  custom_debug_points:
    - "ping_output"
    - "packet_loss"
    - "validation_result"

commands:
  # Step 1: Execute Linux ping command directly
  - name: "execute_ping"
    action: "netmiko_send_command"
    parameters:
      command: "ping -c {{ping_count | default(5)}} {{target_ip}}"
    register: "ping_output"
  
  # Step 2: Parse Linux packet loss (e.g., "0% packet loss")
  - name: "parse_packet_loss"
    action: "parse_output"
    parameters:
      parser: "regex"
      input: "{{ping_output}}"
      pattern: "(\\d+)% packet loss"
    register: "packet_loss"
  
  # Step 3: Calculate success rate and evaluate expectation
  - name: "evaluate_expectation"
    action: "parse_output"
    parameters:
      parser: "jinja"
      input: "{{ping_output}}"
      template: |
        {% set ping_output_str = variables.ping_output | default('') | string %}
        {% set ping_empty = ping_output_str | trim == '' %}
        {% set loss = variables.packet_loss.first_match | default(100) | int %}
        {% set actual_rate = 100 - loss %}
        {% set expect_success_param = parameters.expect_success | default(true) %}
        {% set expect_success_bool = expect_success_param in [true, 'true', 'True', '1', 1] %}
        {% set min_rate = parameters.min_success_rate | default(80) | int %}
        {% set max_rate = parameters.max_failure_rate | default(20) | int %}
        
        {% if ping_empty and not expect_success_bool %}
        {# Blank output when expecting failure = success (ping completely failed) #}
        is_valid: true
        expectation: "failure"
        threshold: {{ max_rate }}
        actual_rate: 0
        packet_loss: 100
        ping_empty: true
        {% elif expect_success_bool %}
        is_valid: {{ actual_rate >= min_rate }}
        expectation: "success"
        threshold: {{ min_rate }}
        actual_rate: {{ actual_rate }}
        packet_loss: {{ loss }}
        ping_empty: {{ ping_empty }}
        {% else %}
        is_valid: {{ actual_rate <= max_rate }}
        expectation: "failure"
        threshold: {{ max_rate }}
        actual_rate: {{ actual_rate }}
        packet_loss: {{ loss }}
        ping_empty: {{ ping_empty }}
        {% endif %}
    register: "validation_result"

validation:
  # Primary validation: Check if the result matches the expectation
  # This now handles blank output when expect_success=false as a valid case
  - field: "validation_result.data.is_valid"
    condition: "equals"
    value: true
    description: "Ping result should match the expected outcome (success or failure)"
