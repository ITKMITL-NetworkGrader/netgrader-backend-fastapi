# Routing Table Validation - Global Custom Task Template
# Validates that specific routes exist in routing table with correct metrics

task_name: "routing_validation"
description: "Validate routing table entries and verify route metrics"
connection_type: "napalm"
author: "NetGrader Team"
version: "1.0.0"
points: 20

parameters:
  - name: "target_network"
    datatype: "string"
    description: "Target network to check in routing table (CIDR format)"
    required: true
    example: "10.0.0.0/8"
  - name: "expected_next_hop"
    datatype: "ip_address"
    description: "Expected next-hop IP address for the route"
    required: true
    example: "192.168.1.1"

# debug:
#   custom_debug_points:
#     - "routing_data"
#     - "next_hop_ips"

commands:
  - name: "get_routing_table"
    action: "napalm_get"
    parameters:
      getter: "get_route_to"
      destination: "{{target_network}}"
    register: "routing_data"

  - name: "parse_next_hop"
    action: "parse_output"
    parameters:
      parser: "jinja"
      input: "{{routing_data}}"
      template: |
        {% set entries = (input.get(parameters.target_network) or []) | map(attribute='next_hop') | list %}
        next_hop: {{ entries[0] if entries else None }}
    register: "next_hop_details"

validation:
  - field: "next_hop_details.data.next_hop"
    condition: "equals"
    value: "{{expected_next_hop}}"
    description: "Next-hop should be the expected value"
