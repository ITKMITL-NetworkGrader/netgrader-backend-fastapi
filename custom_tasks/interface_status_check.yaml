# Interface Status Check - Custom Task Example  
# Demonstrates checking multiple interface parameters using NAPALM

task_name: "interface_status_check"
description: "Comprehensive interface status and configuration check"
connection_type: "napalm"
author: "NetGrader Team"
version: "1.0.0" 
points: 10

parameters:
  # No specific parameters required - checks all interfaces

commands:
  - name: "get_interface_status"
    action: "napalm_get"
    parameters:
      getter: "get_interfaces"
    register: "interface_data"
  
  - name: "get_interface_ips"
    action: "napalm_get"
    parameters:
      getter: "get_interfaces_ip"
    register: "interface_ips"
  
  - name: "parse_interface_count"
    action: "parse_output"
    parameters:
      input: "{{interface_data}}"
      pattern: '(?mi)^(?:\s*)(\S+):\s*UP$'
    register: "up_interfaces"

validation:
  - field: "interface_data"
    condition: "exists"
    value: true
    description: "Interface data should be retrieved successfully"
  
  - field: "up_interfaces.match_count"
    condition: "greater_than"
    value: 0
    description: "At least one interface should be up"
  
  - field: "interface_ips"
    condition: "exists"
    value: true
    description: "Interface IP data should be retrieved successfully"